<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuralTrade AI — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #13131a;
      border: 1px solid #1e1e2e;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p { color: #555; font-size: 13px; margin-top: 4px; }
    .tabs {
      display: flex;
      background: #0a0a0f;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1; padding: 10px;
      border: none; background: transparent;
      color: #555; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 500;
      transition: all 0.2s;
    }
    .tab.active { background: #1e1e2e; color: #fff; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #00d4ff; }
    .btn-primary {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #00d4ff, #7b2fff);
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 6px;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
      line-height: 1.5;
    }
    .alert.error   { background: #2a0a0a; border: 1px solid #ff4444; color: #ff8888; display: block; }
    .alert.success { background: #0a2a1a; border: 1px solid #00cc88; color: #00ffaa; display: block; }
    .forgot { text-align: right; margin-bottom: 14px; }
    .forgot a { color: #00d4ff; font-size: 12px; text-decoration: none; }
    .terms { font-size: 11px; color: #444; text-align: center; margin-top: 14px; line-height: 1.6; }
    .terms a { color: #00d4ff; text-decoration: none; }
    .back { text-align: center; margin-top: 20px; }
    .back a { color: #555; font-size: 13px; text-decoration: none; }
    .back a:hover { color: #fff; }
    #loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 999;
      align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    }
    #loading-overlay.show { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #1e1e2e;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p style="color:#666;font-size:13px" id="loading-text">Please wait...</p>
</div>

<div class="card">
  <div class="logo">
    <h1>🤖 NeuralTrade AI</h1>
    <p>The AI That Trades Smarter For Everyone</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <div id="alert" class="alert"></div>

  <!-- SIGN IN -->
  <div id="form-signin">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signin-email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="••••••••"/>
    </div>
    <div class="forgot"><a href="#" onclick="forgotPassword()">Forgot password?</a></div>
    <button class="btn-primary" onclick="handleSignIn()">Sign In →</button>
  </div>

  <!-- SIGN UP -->
  <div id="form-signup" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 8 characters"/>
    </div>
    <button class="btn-primary" onclick="handleSignUp()">Create Free Account →</button>
    <p class="terms">
      By signing up you agree to our
      <a href="/terms.html">Terms</a> and <a href="/privacy.html">Privacy Policy</a>.
      Trading involves risk.
    </p>
  </div>

  <div class="back"><a href="/index.html">← Back to NeuralTrade AI</a></div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const supabase = createClient(
    'https://ctzvwqsfwqffllelpyai.supabase.co',
    'sb_publishable_5E9NSQb9WV4QoOKnRhMpoQ_ddA7tM2W'
  )

  // Already logged in? Go to dashboard
  try {
    const { data } = await supabase.auth.getSession()
    if (data?.session) window.location.href = '/dashboard.html'
  } catch(e) {}

  function showAlert(msg, type) {
    const el = document.getElementById('alert')
    el.textContent = msg
    el.className = 'alert ' + type
  }

  function showLoading(show, text = 'Please wait...') {
    document.getElementById('loading-overlay').classList.toggle('show', show)
    document.getElementById('loading-text').textContent = text
  }

  window.switchTab = function(tab) {
    document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none'
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none'
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin')
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup')
    document.getElementById('alert').className = 'alert'
  }

  window.handleSignIn = async function() {
    const email = document.getElementById('signin-email').value.trim()
    const password = document.getElementById('signin-password').value
    if (!email || !password) return showAlert('Please enter your email and password.', 'error')

    showLoading(true, 'Signing you in...')
    const { error } = await supabase.auth.signInWithPassword({ email, password })
    showLoading(false)

    if (error) {
      showAlert(error.message.includes('Invalid') ? 'Wrong email or password.' : error.message, 'error')
    } else {
      showLoading(true, 'Welcome back! Loading dashboard...')
      setTimeout(() => window.location.href = '/dashboard.html', 800)
    }
  }

  window.handleSignUp = async function() {
    const name     = document.getElementById('signup-name').value.trim()
    const email    = document.getElementById('signup-email').value.trim()
    const password = document.getElementById('signup-password').value

    if (!name)               return showAlert('Please enter your full name.', 'error')
    if (!email)              return showAlert('Please enter your email.', 'error')
    if (password.length < 8) return showAlert('Password must be at least 8 characters.', 'error')

    showLoading(true, 'Creating your account...')

    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    })

    if (error) {
      showLoading(false)
      return showAlert(error.message, 'error')
    }

    // Send welcome email via our API
    try {
      await fetch('/api/send-welcome', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, name })
      })
    } catch(e) {
      // Email failed silently — don't block signup
      console.log('Welcome email error:', e)
    }

    showLoading(false)
    showAlert('🎉 Account created! Check your email to confirm, then sign in.', 'success')

    // Clear form
    document.getElementById('signup-name').value = ''
    document.getElementById('signup-email').value = ''
    document.getElementById('signup-password').value = ''
  }

  window.forgotPassword = async function() {
    const email = document.getElementById('signin-email').value.trim()
    if (!email) return showAlert('Enter your email above first.', 'error')

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/settings.html'
    })
    if (error) showAlert(error.message, 'error')
    else showAlert('Password reset email sent! Check your inbox.', 'success')
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return
    const signinVisible = document.getElementById('form-signin').style.display !== 'none'
    if (signinVisible) window.handleSignIn()
    else window.handleSignUp()
  })
</script>
</body>
</html>
