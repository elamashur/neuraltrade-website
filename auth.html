<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuralTrade AI — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      color: #f5c842;
    }
    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    .card {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 32px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: #0a0a0f;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: #888;
      transition: all 0.2s;
    }
    .tab.active {
      background: #f5c842;
      color: #0a0a0f;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #0a0a0f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #f5c842; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #f5c842;
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .message.success { background: #0f2e1a; color: #4caf76; border: 1px solid #1a4a2a; }
    .message.error   { background: #2e0f0f; color: #f07070; border: 1px solid #4a1a1a; }
    .divider {
      text-align: center;
      color: #555;
      font-size: 12px;
      margin: 20px 0;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }
    .back-link a { color: #f5c842; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>NeuralTrade AI</h1>
    <p>AI-Powered Crypto Trading</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In Form -->
    <div id="form-signin">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="••••••••" />
      </div>
      <button class="btn" id="signin-btn" onclick="handleSignIn()">Sign In</button>
      <div class="message" id="signin-msg"></div>
    </div>

    <!-- Sign Up Form -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 6 characters" />
      </div>
      <button class="btn" id="signup-btn" onclick="handleSignUp()">Create Account</button>
      <div class="message" id="signup-msg"></div>
    </div>
  </div>

  <div class="back-link">
    <a href="index.html">← Back to home</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ctzvwqsfwqffllelpyai.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_5E9NSQb9WV4QoOKnRhMpoQ_ddA7tM2W';
  const { createClient } = supabase;
  const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // If already logged in, go straight to dashboard
  _supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });

  function switchTab(tab) {
    document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'message ' + type;
    el.style.display = 'block';
  }

  async function handleSignIn() {
    const email = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    const btn = document.getElementById('signin-btn');
    if (!email || !password) return showMsg('signin-msg', 'Please fill in all fields.', 'error');
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    const { error } = await _supabase.auth.signInWithPassword({ email, password });
    if (error) {
      showMsg('signin-msg', error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    } else {
      showMsg('signin-msg', 'Success! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    }
  }

  async function handleSignUp() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const btn = document.getElementById('signup-btn');
    if (!name || !email || !password) return showMsg('signup-msg', 'Please fill in all fields.', 'error');
    if (password.length < 6) return showMsg('signup-msg', 'Password must be at least 6 characters.', 'error');
    btn.disabled = true;
    btn.textContent = 'Creating account...';
    const { error } = await _supabase.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });
    if (error) {
      showMsg('signup-msg', error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    } else {
      showMsg('signup-msg', 'Account created! Check your email to confirm, then sign in.', 'success');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const activeForm = document.getElementById('form-signin').style.display !== 'none' ? 'signin' : 'signup';
      activeForm === 'signin' ? handleSignIn() : handleSignUp();
    }
  });
</script>
</body>
</html>
